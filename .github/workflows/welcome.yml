name: ScoutBot — Welcome Email (Monthly)

# Sends the welcome/intro email to all subscribers once per month,
# on the 1st of each month at 09:00 WAT (08:00 UTC).
# Reduced from every-2-days to avoid overwhelming subscribers.

on:
  schedule:
    - cron: '0 8 1 * *'    # 09:00 WAT on the 1st of every month
  workflow_dispatch:

jobs:
  send-welcome:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore Google service account JSON
        run: |
          echo "${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON_B64 }}" | base64 -d > service_account.json

      - name: Build .env file from secrets
        run: |
          cat > .env <<EOF
          SENDER_EMAIL=${{ secrets.SENDER_EMAIL }}
          GMAIL_APP_PASSWORD=${{ secrets.GMAIL_APP_PASSWORD }}
          SPREADSHEET_ID=${{ secrets.SPREADSHEET_ID }}
          FORM_SHEET_ID=1dFcnVvQjWkuYhN1rplICTY0j88KgvGqQ3FzYId2ru4s
          GOOGLE_SERVICE_ACCOUNT_JSON=service_account.json
          EOF

      - name: Send welcome email to all subscribers
        run: python welcome.py

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: welcome-logs
          path: scoutbot.log
          if-no-files-found: ignore
          retention-days: 7
